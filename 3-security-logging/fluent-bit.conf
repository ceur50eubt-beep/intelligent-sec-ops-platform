[SERVICE]
    Flush        1
    Log_Level    info

[INPUT]
    Name         tail
    Path         /var/log/nginx/access.log
    Tag          nginx.access

[OUTPUT]
    Name         s3
    Match        nginx.access
    bucket       security-logs
    endpoint     http://minio:9000
    aws_key      minioadmin
    aws_secret   minioadmin
    tls          off
    use_put_object_on_left_id on
